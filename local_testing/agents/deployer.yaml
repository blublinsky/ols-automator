name: deployer
description: "Deployment management agent — handles rollouts, scaling, and image updates."
port: 9091

skills:
  - id: deploy-rollout
    name: Application Deployment
    description: "Deploy applications, manage rollouts, and update container images."
    tags: [deployment, rollout, containers, images]
    examples:
      - "Deploy the new version of frontend"
      - "Roll out image v2.1 to production"
    response: |
      Deployment completed successfully.

      Actions taken:
      1. Updated image: frontend:v2.0 → frontend:v2.1
      2. Rolling update strategy applied (maxSurge=1, maxUnavailable=0)
      3. All 3 replicas healthy

  - id: scaling
    name: Workload Scaling
    description: "Scale deployments and statefulsets up or down."
    tags: [scaling, replicas, autoscaling, capacity]
    examples:
      - "Scale frontend to 5 replicas"
      - "Set up autoscaling for the API deployment"
    response: |
      Scaling applied successfully.

      Actions taken:
      1. Scaled deployment frontend: 3 → 5 replicas
      2. All new pods scheduled and healthy
      3. Service endpoints updated
